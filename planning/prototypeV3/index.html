<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Limelight Yardstick - Movie Rating Social Network (Prototype V3)">
    <meta name="theme-color" content="#1a1a2e">
    
    <title>Limelight Yardstick - Prototype V3</title>
    
    <!-- Bootstrap 5.3.2 CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <!-- Google Fonts - Bebas Neue (headings) + Inter (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- jQuery UI CSS for drag-and-drop -->
    <link rel="stylesheet" href="https://voltron42.github.io/archive/jquery-ui-drag-and-drop/jquery-ui.min.css"/>
    <link rel="stylesheet" href="https://voltron42.github.io/archive/jquery-ui-drag-and-drop/jquery-ui.structure.min.css"/>
    <link rel="stylesheet" href="https://voltron42.github.io/archive/jquery-ui-drag-and-drop/jquery-ui.theme.min.css"/>
    
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/d550ee8263.js" crossorigin="anonymous"></script>
    
    <!-- Local styles (custom CSS, minimal) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- importNamespace - Module system from gizmo-atheneum -->
    <script src="https://gizmo-atheneum.github.io/structure/importnamespace/script.js"></script>
    
    <!-- React and React-DOM from CDN (UMD builds) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel Standalone for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- jQuery for drag-and-drop -->
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://voltron42.github.io/archive/jquery-ui-drag-and-drop/jquery-ui.min.js"></script>
    <script src="https://voltron42.github.io/archive/jquery-ui-touch-punch/jquery.ui.touch-punch.min.js"></script>
    
    <!-- LOCAL NAMESPACE MODULES - Load in alphabetical order for readability -->
    <!-- importNamespace automatically handles dependency resolution -->
    
    <!-- Components (alphabetical) -->
    <script type="text/babel" src="scripts/components/Dashboard.js"></script>
    <script type="text/babel" src="scripts/components/Navigation.js"></script>
    <script type="text/babel" src="scripts/components/Scorecard.js"></script>
    
    <!-- Utilities (alphabetical) -->
    <script type="text/babel" src="scripts/utils/dataService.js"></script>
    <script type="text/babel" src="scripts/utils/scoreCalculator.js"></script>
    
    <!-- Main app component -->
    <script type="text/babel" src="scripts/main.js"></script>
    
    <!-- INITIALIZATION SCRIPT - Runs after all namespace definitions loaded -->
    <script type="text/babel">
        (function() {
            try {
                // Import main app component
                const Main = importNamespace("ly.prototypeV3.Main");
                
                // Render to root when DOM is ready
                ReactDOM.createRoot(document.getElementById("app-root")).render(<Main />);
                
                // Check for unused namespaces (development debugging)
                const unused = listUnusedNamespaces();
                if (unused.length > 0) {
                    console.warn("Unused namespaces:", unused);
                }
            } catch (error) {
                console.error("Failed to initialize app:", error);
                document.getElementById("app-root").innerHTML = 
                    '<div class="alert alert-danger mt-5">' +
                    '<h2>Error Loading Application</h2>' +
                    '<p>' + error.message + '</p>' +
                    '<pre>' + error.stack + '</pre>' +
                    '</div>';
            }
        })();
    </script>
</head>
<body class="bg-dark text-light">
    <!-- React will render the app here -->
    <div id="app-root" class="container-fluid"></div>
</body>
</html>
