<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Limelight Yardstick - Movie Rating Social Network">
    <meta name="theme-color" content="#2c3e50">
    
    <title>Limelight Yardstick - Movie Rating Social Network</title>
    
    <!-- Bootstrap 5 CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/d550ee8263.js" crossorigin="anonymous"></script>
    
    <!-- importNamespace - Module system from gizmo-atheneum -->
    <script src="https://gizmo-atheneum.github.io/structure/importnamespace/script.js"></script>
    
    <!-- React and React-DOM from CDN (UMD builds) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel Standalone for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    
    <!-- Local styles (custom CSS, minimal) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Local namespace modules (alphabetical order for readability) -->
    <!-- importNamespace automatically handles dependency resolution -->
    
    <!-- Components (alphabetical) -->
    <script type="text/babel" src="scripts/components/Dashboard.js"></script>
    <script type="text/babel" src="scripts/components/MovieScoreboard.js"></script>
    <script type="text/babel" src="scripts/components/Navigation.js"></script>
    <script type="text/babel" src="scripts/components/Scorecard.js"></script>
    <script type="text/babel" src="scripts/components/UserScoreboard.js"></script>
    
    <!-- Utilities (alphabetical) -->
    <script type="text/babel" src="scripts/utils/dataService.js"></script>
    <script type="text/babel" src="scripts/utils/filters.js"></script>
    <script type="text/babel" src="scripts/utils/scoreCalculator.js"></script>
    
    <!-- Main app component -->
    <script type="text/babel" src="scripts/main.js"></script>
    
    <!-- Initialization script - runs after all dependencies loaded -->
    <script type="text/babel">
        (function() {
            try {
                // Import main app component
                const Main = importNamespace("lyapp.Main");
                
                // Render to root when DOM is ready
                ReactDOM.createRoot(document.getElementById("app-root")).render(<Main />);
                
                // Check for unused namespaces (development debugging)
                const unused = listUnusedNamespaces();
                if (unused.length > 0) {
                    console.warn("Unused namespaces:", unused);
                }
            } catch (error) {
                console.error("Failed to initialize app:", error);
                document.getElementById("app-root").innerHTML = 
                    '<div class="alert alert-danger mt-5 m-4">' +
                    '<h2>Error Loading Application</h2>' +
                    '<p>' + error.message + '</p>' +
                    '<pre>' + error.stack + '</pre>' +
                    '</div>';
            }
        })();
    </script>
</head>
<body class="bg-light">
    <!-- React will render the app here -->
    <div id="app-root"></div>
</body>
</html>
